# Image-layout overrides for the "Carl Barks and the Art of the Comic Book"
# EPUB build. Each [[image_overrides]] entry tweaks how one figure is sized or
# placed in the rendered page.
#
# Match (which image the entry applies to):
#   parse_dir            = required; the parse dir name (e.g. "cbart-scan-all").
#   spread               = required; substring of the source spread stem
#                          (e.g. "CBatAotCB-057").
#   caption_starts_with  = match the image whose caption begins with this text;
#   url                  = match the image by its url/filename stem.
#                          Give at least one of caption_starts_with / url.
#   side                 = optional "left" or "right" (which page of a spread).
#
# Style (at least one required):
#   width        = CSS width, e.g. "90%".
#   max_height   = CSS max-height, e.g. "45vh".
#   space_above  = vertical gap before the figure, e.g. "2em".
#   class        = CSS class on the <figure>, e.g. "side-by-side".

[[image_overrides]]
parse_dir = "cbart-scan-all"
spread = "CBatAotCB-034"
caption_starts_with = "Roger Armstrong"
width = "90%"
max_height = "45vh"

