# Format overrides for the Carl Barks Conversations EPUB build.
#
# The bbox heuristic promotes indented text items to <blockquote>. This file
# demotes the false positives — TOC lines, interview bylines, and running-header
# leaks — back to ordinary <p>. Each override matches on spread stem (substring)
# plus the first few characters of the item text. Use ``as = "blockquote"`` to
# promote an item the heuristic missed.

# --- Copyright page (spread 002 left) ---

[[overrides]]
parse_dir = "cb-scan-1"
spread = "spread_002"
side = "left"
text_starts_with = "Library of Congress"
as = "paragraph"

# --- Table of Contents (spread 002 right, spread 003 left/right) ---

[[overrides]]
parse_dir = "cb-scan-1"
spread = "spread_002"
side = "right"
text_starts_with = "Introduction ix"
as = "paragraph"

[[overrides]]
parse_dir = "cb-scan-1"
spread = "spread_023"
side = "right"
text_starts_with = "From Comic Art #7"
as = "blockquote"

[[overrides]]
parse_dir = "cb-scan-1"
